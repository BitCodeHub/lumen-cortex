services:
  - type: web
    name: lumen-cortex
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: AZURE_ANTHROPIC_API_KEY
        sync: false
      - key: MOBSF_API_KEY
        sync: false
      - key: GOOGLE_PAGESPEED_API_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
    healthCheckPath: /
    autoDeploy: true
