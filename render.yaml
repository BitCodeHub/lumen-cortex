services:
  - type: web
    name: lumen-cortex
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node --max-old-space-size=450 server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: "true"
      - key: AZURE_ANTHROPIC_API_KEY
        sync: false
      - key: MOBSF_API_KEY
        sync: false
      - key: GOOGLE_PAGESPEED_API_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
    healthCheckPath: /
    autoDeploy: true
